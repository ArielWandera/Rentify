services:

  app:
    build:
      context: .
      target: app
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor          # keep container's vendor
      - /var/www/html/public/build    # keep container's built assets
    environment:
      - APP_ENV=local
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rentify

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/public/build    # keep container's built assets
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - rentify

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-rentify}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rentify

  queue:
    build:
      context: .
      target: app
    command: php artisan queue:work database --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rentify

  scheduler:
    build:
      context: .
      target: app
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rentify

volumes:
  postgres_data:

networks:
  rentify:
    driver: bridge
